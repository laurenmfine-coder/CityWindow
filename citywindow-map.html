<style>
  :root {
    --ink: #1a1614;
    --cream: #faf8f4;
    --parchment: #f2ede4;
    --terracotta: #b85c38;
    --sage: #5c7a5e;
    --gold: #c9a84c;
    --indigo: #3d5a80;
    --dust: #8a7f72;
    --border: #e0d8cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .logo span {
    color: var(--terracotta);
  }

  .city-badge {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(250,248,244,0.6);
  }

  /* FILTER BAR */
  .filter-bar {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: white;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--dust);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--cream);
  }

  .filter-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  /* MAP CONTAINER */
  #map {
    flex: 1;
    width: 100%;
  }

  /* BOTTOM SHEET */
  .sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
    z-index: 200;
    transform: translateY(calc(100% - 72px));
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
  }

  .sheet.open {
    transform: translateY(0);
  }

  .sheet.peek {
    transform: translateY(calc(100% - 72px));
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    cursor: pointer;
    flex-shrink: 0;
  }

  .sheet-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sheet-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
  }

  .sheet-count {
    font-size: 12px;
    color: var(--dust);
    font-weight: 300;
  }

  .sheet-body {
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  /* PLACE DETAIL */
  .place-detail {
    padding: 20px;
    display: none;
  }

  .place-detail.visible {
    display: block;
  }

  .place-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .place-meta {
    font-size: 12px;
    color: var(--dust);
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .place-note {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.6;
    color: #3a3530;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--parchment);
    border-left: 3px solid var(--terracotta);
    border-radius: 0 4px 4px 0;
  }

  .endorsements {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .endorsement {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--parchment);
    border-radius: 8px;
  }

  .endo-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: white;
    flex-shrink: 0;
  }

  .endo-body { flex: 1; }

  .endo-blogger {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
  }

  .endo-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: #3a3530;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .endo-link {
    font-size: 11px;
    color: var(--indigo);
    text-decoration: none;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .endo-link:hover { text-decoration: underline; }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .btn-save {
    flex: 1;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
  }

  .btn-maps {
    flex: 1;
    background: white;
    color: var(--ink);
    border: 1px solid var(--border);
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  /* PLACE LIST */
  .place-list { display: none; }
  .place-list.visible { display: block; }

  .place-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .place-item:hover { background: var(--parchment); }

  .place-item-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .place-item-info { flex: 1 }

  .place-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .place-item-sub {
    font-size: 11px;
    color: var(--dust);
    font-weight: 300;
  }

  .place-item-badges {
    display: flex;
    gap: 4px;
  }

  .badge {
    font-size: 9px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* LAYER LEGEND */
  .legend {
    position: fixed;
    top: 110px;
    right: 12px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 6px;
    font-size: 11px;
    color: var(--ink);
    font-weight: 400;
  }

  .legend-item:last-child { margin-bottom: 0; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SAVED TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--sage);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);

  .voice-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);

  .sheet-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (min-width: 768px) {

    header { width: 100%; }
    .filter-bar { width: 100%; }

    .sheet {

      top: 97px;
      right: 0;
      bottom: 0;
      left: auto;
      width: 360px;
      border-radius: 0;
      transform: none !important;
      box-shadow: -4px 0 20px rgba(0,0,0,0.08);
      max-height: none;
    }
    .legend { top: 120px; }
  }
</style>

        initial: "L",
        text: "One of the great spots in the west loop that opened in recent years. The sandwiches alone are worth the detour.",
        url: "https://www.lottieanddoof.com/chicagoguide/",
        source: "lottie"
      }
    ],
    sources: ["lottie"]
  },
  {
    id: 13,
    name: "Chicago Riverwalk",
    address: "Chicago Riverwalk, Chicago, IL 60601",
    neighborhood: "Downtown",
    category: "Outdoor",
    lat: 41.8874, lng: -87.6298,
    note: "Walk west from Michigan Ave along the river. Great at any hour — coffee in morning, drinks at sunset. Free and beautiful.",
    endorsements: [
      {
        blogger: "312food",
        handle: "@312food",
        color: "#3d5a80",
        initial: "3",
        text: "One of Chicago's best features — the Riverwalk is a perfect way to experience the city between conference sessions.",
        url: "https://www.312food.com/",
        source: "312food"
      }
    ],
    sources: ["312food"]
  },
  {
    id: 14,
    name: "Schwa",
    address: "1466 N Ashland Ave, Chicago, IL 60622",
    neighborhood: "Wicker Park",
    category: "Fine Dining",
    lat: 41.9082, lng: -87.6687,
    note: "BYOB tasting menu. The Chicago restaurant equivalent of the most interesting man in the world. Reservations required, months in advance.",
    endorsements: [
      {
        blogger: "The Infatuation",
        handle: "@infatuationchi",
        color: "#5c7a5e",
        initial: "I",
        text: "The Chicago restaurant equivalent of the most interesting man in the world. Rated 9.5 — one of the most unique dining experiences in the city.",
        url: "https://www.theinfatuation.com/chicago/guides/best-restaurants-chicago",
        source: "infatuation"
      }
    ],
    sources: ["infatuation"]
  }
];

// Source colors
const SOURCE_COLORS = {
  lottie: "#b85c38",
  "312food": "#3d5a80",
  infatuation: "#5c7a5e"
};

let map, markers = [], savedPlaces = new Set(), currentFilter = "all";
let sheetOpen = false, currentPlace = null;

// ─── INIT MAP ───────────────────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 41.8881, lng: -87.6565 },
    zoom: 13,
    styles: [
      { featureType: "all", elementType: "geometry", stylers: [{ color: "#f5f0e8" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road.arterial", elementType: "geometry", stylers: [{ color: "#e8e0d0" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#c8dce8" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#d4e6c3" }] },
      { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
      { featureType: "transit", stylers: [{ visibility: "simplified" }] },
      { featureType: "administrative", elementType: "labels.text.fill", stylers: [{ color: "#8a7f72" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#6b6356" }] },
      { featureType: "landscape.man_made", elementType: "geometry", stylers: [{ color: "#ede8de" }] }
    ],
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions: {
      position: google.maps.ControlPosition.LEFT_BOTTOM
    }
  });

  buildMarkers();
  buildList();
}

// ─── MARKERS ────────────────────────────────────────────────────────
function buildMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];

  const filtered = getFiltered();

  filtered.forEach(place => {
    const primarySource = place.sources[0];
    const color = SOURCE_COLORS[primarySource] || "#8a7f72";

    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 12 16 24 16 24S32 28 32 16C32 7.163 24.837 0 16 0z"
              fill="${color}" opacity="0.95"/>
        <circle cx="16" cy="16" r="7" fill="white"/>
        <circle cx="16" cy="16" r="4" fill="${color}"/>
        ${place.sources.length > 1 ? `<circle cx="24" cy="8" r="5" fill="#1a1614" stroke="white" stroke-width="1.5"/>
        <text x="24" y="12" font-size="7" font-weight="600" fill="white" text-anchor="middle" font-family="sans-serif">${place.sources.length}</text>` : ''}
      </svg>`;

    const icon = {
      url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
      scaledSize: new google.maps.Size(32, 40),
      anchor: new google.maps.Point(16, 40)
    };

    const marker = new google.maps.Marker({
      position: { lat: place.lat, lng: place.lng },
      map,
      icon,
      title: place.name,
      animation: google.maps.Animation.DROP
    });

    marker.addListener("click", () => openPlace(place));
    markers.push(marker);
  });

  document.getElementById("placeCount").textContent = `${filtered.length} places`;
}

// ─── FILTER ─────────────────────────────────────────────────────────
function getFiltered() {
  if (currentFilter === "all") return PLACES;
  if (currentFilter === "saved") return PLACES.filter(p => savedPlaces.has(p.id));
  return PLACES.filter(p => p.sources.includes(currentFilter));
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.filter === filter);
  });
  buildMarkers();
  buildList();
  if (sheetOpen && currentPlace) {
    closeDetail();
  }
}

// ─── LIST ───────────────────────────────────────────────────────────
function buildList() {
  const list = document.getElementById("placeList");
  const filtered = getFiltered();
  list.innerHTML = "";

  filtered.forEach(place => {
    const primarySource = place.sources[0];
    const color = SOURCE_COLORS[primarySource] || "#8a7f72";

    const div = document.createElement("div");
    div.className = "place-item";
    div.onclick = () => openPlace(place);

    const badges = place.sources.map(s => {
      const labels = { lottie: "L+D", "312food": "312", infatuation: "Infat." };
      return `<span class="badge" style="background:${SOURCE_COLORS[s]}20;color:${SOURCE_COLORS[s]}">${labels[s]}</span>`;
    }).join("");

    const savedStar = savedPlaces.has(place.id) ? ' ★' : '';

    div.innerHTML = `
      <span class="place-item-dot" style="background:${color}"></span>
      <div class="place-item-info">
        <div class="place-item-name">${place.name}${savedStar}</div>
        <div class="place-item-sub">${place.neighborhood} · ${place.category}</div>
      </div>
      <div class="place-item-badges">${badges}</div>`;

    list.appendChild(div);
  });
}

// ─── OPEN PLACE ─────────────────────────────────────────────────────
function openPlace(place) {
  currentPlace = place;
  map.panTo({ lat: place.lat, lng: place.lng });
  map.setZoom(15);

  const detail = document.getElementById("placeDetail");
  const endos = place.endorsements.map(e => `
    <div class="endorsement">
      <div class="endo-avatar" style="background:${e.color}">${e.initial}</div>
      <div class="endo-body">
        <div class="endo-blogger">${e.blogger} <span style="font-weight:300;color:#8a7f72">${e.handle}</span></div>
        <div class="endo-text">"${e.text}"</div>
        <a href="${e.url}" target="_blank" class="endo-link">Read full post →</a>
      </div>
    </div>`).join("");

  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name + " " + place.address)}`;

  detail.innerHTML = `
    <div class="place-name">${place.name}</div>
    <div class="place-meta">${place.neighborhood} · ${place.category}</div>
    <div class="place-note">${place.note}</div>
    <div class="endorsements">${endos}</div>
    <div class="action-row">
      <button class="btn-save" onclick="savePlace(${place.id})" id="saveBtn${place.id}">
        ${savedPlaces.has(place.id) ? '★ Saved' : '☆ Save to Guide'}
      </button>
      <a href="${mapsUrl}" target="_blank" class="btn-maps">
        ↗ Google Maps
      </a>
    </div>`;

  showTab("detail");
  openSheet();
}

function closeDetail() {
  currentPlace = null;
  showTab("list");
}

// ─── TABS ────────────────────────────────────────────────────────────
function showTab(tab) {
  const detail = document.getElementById("placeDetail");
  const list = document.getElementById("placeList");
  const voiceTabs = document.getElementById("voiceTabs");
  const listHeader = document.getElementById("listHeader");
  const tabs = document.querySelectorAll(".voice-tab");

  if (tab === "detail") {
    detail.classList.add("visible");
    list.classList.remove("visible");
    voiceTabs.style.display = "flex";
    listHeader.style.display = "none";
    tabs[0].classList.add("active");
    tabs[1].classList.remove("active");
  } else {
    detail.classList.remove("visible");
    list.classList.add("visible");
    voiceTabs.style.display = "flex";
    listHeader.style.display = "none";
    tabs[1].classList.add("active");
    tabs[0].classList.remove("active");
    buildList();
  }
}

// ─── SHEET ──────────────────────────────────────────────────────────
function openSheet() {
  sheetOpen = true;
  document.getElementById("sheet").classList.add("open");
  document.getElementById("sheet").classList.remove("peek");
}

function toggleSheet() {
  if (!sheetOpen) {
    openSheet();
    if (!currentPlace) {
      showTab("list");
      document.getElementById("listHeader").style.display = "flex";
      document.getElementById("voiceTabs").style.display = "none";
    }
  } else {
    sheetOpen = false;
    document.getElementById("sheet").classList.remove("open");
    document.getElementById("sheet").classList.add("peek");
    document.getElementById("listHeader").style.display = "flex";
    document.getElementById("voiceTabs").style.display = "none";
  }
}

// ─── SAVE ───────────────────────────────────────────────────────────
function savePlace(id) {
  if (savedPlaces.has(id)) {
    savedPlaces.delete(id);
  } else {
    savedPlaces.add(id);
    showToast("Saved to your guide ✓");
  }
  const btn = document.getElementById(`saveBtn${id}`);
  if (btn) btn.textContent = savedPlaces.has(id) ? '★ Saved' : '☆ Save to Guide';
  buildList();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ─── INIT LIST ───────────────────────────────────────────────────────
buildList();
</script>
